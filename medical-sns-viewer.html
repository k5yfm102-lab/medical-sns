<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>医療SNS広報ビューア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --white: #ffffff;
    --gray50: #f8f9fa;
    --gray100: #f1f3f5;
    --gray200: #e9ecef;
    --gray300: #dee2e6;
    --gray400: #ced4da;
    --gray500: #adb5bd;
    --gray600: #6c757d;
    --gray700: #495057;
    --gray800: #343a40;
    --gray900: #212529;
    --blue: #1971c2;
    --blue-light: #e7f5ff;
    --blue-mid: #4dabf7;
    --green: #2f9e44;
    --green-light: #ebfbee;
    --red: #c92a2a;
    --red-light: #fff5f5;
    --orange: #e8590c;
    --orange-light: #fff4e6;
    --yellow: #e67700;
    --yellow-light: #fff9db;
    --teal: #0c8599;
    --teal-light: #e3fafc;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow: 0 2px 8px rgba(0,0,0,.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--gray100);
    color: var(--gray900);
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  /* ── HEADER ── */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--gray200);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--blue);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--gray900); }
  .header-sub { font-size: 11px; color: var(--gray500); margin-top: 1px; }

  /* フィルタータブ */
  .filter-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 5px 13px;
    background: var(--gray100);
    border: 1.5px solid var(--gray200);
    border-radius: 20px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray600);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .tab.active {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
    font-weight: 700;
  }

  /* ── PASTE SCREEN ── */
  .paste-screen {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .info-card {
    background: var(--blue-light);
    border: 1px solid #a5d8ff;
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .info-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .info-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .info-step {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--gray700);
  }
  .step-num {
    width: 20px; height: 20px;
    background: var(--blue);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .paste-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray700);
    margin-bottom: 6px;
  }
  .paste-textarea {
    width: 100%;
    min-height: 140px;
    padding: 12px 14px;
    border: 1.5px solid var(--gray300);
    border-radius: var(--radius);
    font-family: 'Menlo', 'Courier New', monospace;
    font-size: 12px;
    color: var(--gray800);
    background: var(--white);
    resize: vertical;
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }
  .paste-textarea:focus { border-color: var(--blue); }
  .paste-textarea::placeholder { color: var(--gray400); font-family: inherit; }

  .btn-load {
    width: 100%;
    padding: 14px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .15s;
    -webkit-appearance: none;
  }
  .btn-load:active { background: #1864ab; }

  /* ── RESULTS SCREEN ── */
  .results-screen { padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  .summary-bar {
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: var(--shadow-sm);
  }
  .summary-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }
  .summary-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1.2;
  }
  .summary-label {
    font-size: 10px;
    color: var(--gray500);
    margin-top: 1px;
  }
  .summary-divider {
    width: 1px;
    height: 32px;
    background: var(--gray200);
  }

  /* ── ARTICLE CARD ── */
  .article-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    border: 1px solid var(--gray200);
  }
  .card-accent {
    height: 4px;
  }
  .accent-高 { background: linear-gradient(90deg, var(--orange), #ffa94d); }
  .accent-中 { background: linear-gradient(90deg, var(--yellow), #ffe066); }
  .accent-低 { background: var(--gray200); }

  .card-body { padding: 14px 15px; }

  .card-badges {
    display: flex;
    gap: 5px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-imp-高 { background: var(--orange-light); color: var(--orange); }
  .badge-imp-中 { background: var(--yellow-light); color: var(--yellow); }
  .badge-imp-低 { background: var(--gray100); color: var(--gray500); }
  .badge-cat-患者 { background: var(--green-light); color: var(--green); }
  .badge-cat-医療 { background: var(--teal-light); color: var(--teal); }
  .badge-cat-広報 { background: var(--blue-light); color: var(--blue); }
  .badge-source { background: var(--gray100); color: var(--gray600); font-weight: 400; }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray900);
    line-height: 1.45;
    margin-bottom: 6px;
  }
  .card-title a { color: inherit; text-decoration: none; }

  .card-meta {
    font-size: 11px;
    color: var(--gray500);
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .card-reason {
    font-size: 12px;
    color: var(--gray600);
    background: var(--gray50);
    border-left: 3px solid var(--gray300);
    padding: 7px 10px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 10px;
  }

  /* 投稿案 */
  .draft-section {
    background: var(--green-light);
    border: 1px solid #b2f2bb;
    border-radius: var(--radius-sm);
    padding: 12px 13px;
    margin-bottom: 10px;
  }
  .draft-header {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 7px;
  }
  .draft-text-display {
    font-size: 13px;
    color: var(--gray800);
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .hashtags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .hashtag {
    font-size: 11px;
    color: var(--blue);
    background: var(--blue-light);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* コピーボタン */
  .btn-copy {
    width: 100%;
    padding: 12px;
    background: var(--gray900);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
  }
  .btn-copy:active { background: var(--gray700); transform: scale(.98); }
  .btn-copy.copied { background: var(--green); }

  .btn-reset {
    width: 100%;
    padding: 12px;
    background: var(--white);
    color: var(--gray600);
    border: 1.5px solid var(--gray300);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    -webkit-appearance: none;
  }
  .btn-reset:active { background: var(--gray100); }

  /* トースト */
  #toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gray900);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray500);
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 8px; }
  .empty-state-title { font-size: 14px; font-weight: 700; color: var(--gray600); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-mark">＋</div>
    <div>
      <div class="header-title">医療SNS広報ビューア</div>
      <div class="header-sub">投稿案の確認 &amp; コピー</div>
    </div>
  </div>
  <div class="filter-tabs" id="filter-tabs" style="display:none">
    <button class="tab active" onclick="setFilter('all',this)">すべて</button>
    <button class="tab" onclick="setFilter('高',this)">🔴 重要度 高</button>
    <button class="tab" onclick="setFilter('中',this)">🟡 重要度 中</button>
    <button class="tab" onclick="setFilter('患者向け',this)">患者向け</button>
    <button class="tab" onclick="setFilter('一般広報',this)">一般広報</button>
  </div>
</div>

<!-- 貼り付け画面 -->
<div id="paste-screen" class="paste-screen">
  <div class="info-card">
    <div class="info-card-title">📋 使い方</div>
    <div class="info-steps">
      <div class="info-step">
        <div class="step-num">1</div>
        <div>PCのHTMLツールで記事を収集してプロンプトをコピー</div>
      </div>
      <div class="info-step">
        <div class="step-num">2</div>
        <div>Claude.aiアプリでプロンプトを送信してJSONをコピー</div>
      </div>
      <div class="info-step">
        <div class="step-num">3</div>
        <div>下の欄にJSONを貼り付けて「読み込む」を押す</div>
      </div>
    </div>
  </div>

  <div>
    <div class="paste-label">ClaudeのJSON回答を貼り付け</div>
    <textarea
      id="json-input"
      class="paste-textarea"
      placeholder='{"articles":[{"index":1,"importance":"高",...}]}'
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    ></textarea>
  </div>

  <button class="btn-load" onclick="loadJSON()">
    読み込む →
  </button>
</div>

<!-- 結果画面 -->
<div id="results-screen" class="results-screen" style="display:none"></div>

<div id="toast"></div>

<script>
let allArticles = [];
let currentFilter = 'all';

function showToast(msg, dur = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function loadJSON() {
  let text = document.getElementById('json-input').value.trim();
  if (!text) { showToast('JSONを貼り付けてください'); return; }
  try {
    // iPhoneのスマート引用符・特殊ダッシュを標準文字に自動変換
    text = text
      .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"')  // " " 等 → "
      .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'")  // ' ' 等 → '
      .replace(/[\u2013\u2014]/g, '-')                           // – — → -
      .replace(/\u00A0/g, ' ');                                  // ノーブレークスペース → 半角スペース
    const cleaned = text.replace(/```json|```/g, '').trim();
    const match = cleaned.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(match ? match[0] : cleaned);
    allArticles = parsed.articles || parsed;
    if (!allArticles.length) throw new Error('記事なし');

    document.getElementById('paste-screen').style.display = 'none';
    document.getElementById('filter-tabs').style.display = 'flex';
    currentFilter = 'all';
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i===0));
    renderResults();
    showToast(`${allArticles.length}件を読み込みました`);
  } catch(e) {
    showToast('読み込み失敗。JSONをそのまま貼り付けてください');
    console.error(e);
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}

function getCatBadgeClass(cat) {
  if (!cat) return 'badge-cat-広報';
  if (cat.includes('患者')) return 'badge-cat-患者';
  if (cat.includes('医療')) return 'badge-cat-医療';
  return 'badge-cat-広報';
}

function renderResults() {
  const filtered = allArticles.filter(a => {
    if (currentFilter === 'all') return a.post_category !== '不適切';
    if (['高','中','低'].includes(currentFilter)) return a.importance === currentFilter;
    if (currentFilter === '患者向け') return a.post_category === '患者向け';
    if (currentFilter === '一般広報') return a.post_category === '一般広報';
    return true;
  });

  const highCount = allArticles.filter(a => a.importance === '高').length;
  const midCount  = allArticles.filter(a => a.importance === '中').length;
  const validCount = allArticles.filter(a => a.post_category !== '不適切').length;

  const container = document.getElementById('results-screen');

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-title">該当する記事がありません</div>
      </div>`;
    container.style.display = 'flex';
    return;
  }

  const summaryHtml = `
    <div class="summary-bar">
      <div class="summary-stat">
        <div class="summary-num">${validCount}</div>
        <div class="summary-label">投稿候補</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <div class="summary-num" style="color:var(--orange)">${highCount}</div>
        <div class="summary-label">重要度 高</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <div class="summary-num" style="color:var(--yellow)">${midCount}</div>
        <div class="summary-label">重要度 中</div>
      </div>
    </div>`;

  const cardsHtml = filtered.map((a, i) => {
    const imp = a.importance || '低';
    const draft = a.sns_post_draft || '';
    const tags = (a.hashtags || []).map(h => `<span class="hashtag">#${h.replace(/^#/,'')}</span>`).join('');
    const realIdx = allArticles.indexOf(a);
    return `
    <div class="article-card">
      <div class="card-accent accent-${imp}"></div>
      <div class="card-body">
        <div class="card-badges">
          <span class="badge badge-imp-${imp}">重要度 ${imp}</span>
          <span class="badge ${getCatBadgeClass(a.post_category)}">${a.post_category||''}</span>
          <span class="badge badge-source">${a.source||''}</span>
        </div>
        <div class="card-title">
          <a href="${a.url||'#'}" target="_blank" rel="noopener">${a.title||''}</a>
        </div>
        <div class="card-meta">
          <span>${a.category||''}</span>
          ${a.published ? `<span>・</span><span>${a.published}</span>` : ''}
        </div>
        ${a.reason ? `<div class="card-reason">📌 ${a.reason}</div>` : ''}
        ${draft ? `
        <div class="draft-section">
          <div class="draft-header">SNS 投稿案</div>
          <div class="draft-text-display" id="draft-text-${realIdx}">${draft}</div>
          <div class="hashtags">${tags}</div>
        </div>
        <button class="btn-copy" id="copy-btn-${realIdx}" onclick="copyDraft(${realIdx}, this)">
          📋 投稿案をコピー
        </button>` : '<div style="font-size:12px;color:var(--gray400);margin-top:4px">投稿案なし（不適切と判定）</div>'}
      </div>
    </div>`;
  }).join('');

  const resetHtml = `<button class="btn-reset" onclick="resetView()">← 新しいJSONを読み込む</button>`;

  container.innerHTML = summaryHtml + cardsHtml + resetHtml;
  container.style.display = 'flex';
}

async function copyDraft(i, btn) {
  const a = allArticles[i];
  const tags = (a.hashtags || []).map(h => `#${h.replace(/^#/,'')}`).join(' ');
  const text = (a.sns_post_draft || '') + (tags ? '\n\n' + tags : '');
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = '✓ コピーしました';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    showToast('投稿案をコピーしました');
  } catch {
    showToast('コピー失敗 — テキストを長押しでコピーしてください');
  }
}

function resetView() {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('paste-screen').style.display = 'flex';
  document.getElementById('filter-tabs').style.display = 'none';
  document.getElementById('json-input').value = '';
  allArticles = [];
}
</script>
</body>
</html>
